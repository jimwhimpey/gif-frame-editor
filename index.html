<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Frame Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>GIF Frame Editor</h1>
  </header>

  <main>
    <!-- Upload area -->
    <div id="upload-area" class="upload-area">
      <input type="file" id="file-input" accept=".gif" hidden>
      <div class="upload-prompt">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop a GIF here or click to upload</p>
      </div>
    </div>

    <!-- Editor (hidden until GIF loaded) -->
    <div id="editor" class="editor hidden">
      <!-- Preview -->
      <section class="preview-section">
        <div class="preview-header">
          <h2>Preview</h2>
          <div class="preview-controls">
            <button id="btn-play" class="btn btn-icon" title="Play/Pause">
              <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <span id="preview-frame-counter" class="frame-counter">Frame 1 / 1</span>
          </div>
        </div>
        <div class="preview-canvas-wrap">
          <canvas id="preview-canvas"></canvas>
        </div>
      </section>

      <!-- Toolbar -->
      <section class="toolbar">
        <div class="toolbar-left">
          <button id="btn-select-all" class="btn btn-sm">Select All</button>
          <button id="btn-select-none" class="btn btn-sm">Select None</button>
          <button id="btn-invert-selection" class="btn btn-sm">Invert</button>
          <span id="selection-count" class="selection-info">0 selected</span>
        </div>
        <div class="toolbar-right">
          <div class="toolbar-group">
            <label for="bulk-delay">Delay (ms):</label>
            <input type="number" id="bulk-delay" min="7" max="10000" step="1" value="100" class="input-sm">
            <button id="btn-set-delay" class="btn btn-sm btn-primary">Set Timing</button>
          </div>
          <button id="btn-remove-frames" class="btn btn-sm btn-danger">Remove Selected</button>
          <button id="btn-undo" class="btn btn-sm" disabled title="Undo (Cmd+Z)">Undo</button>
        </div>
      </section>

      <!-- Frame timeline -->
      <section class="timeline">
        <div id="frames-container" class="frames-container"></div>
      </section>

      <!-- Export -->
      <section class="export-section">
        <button id="btn-export" class="btn btn-lg btn-primary">Export GIF</button>
        <button id="btn-load-new" class="btn btn-lg">Load New GIF</button>
        <div id="export-progress" class="export-progress hidden">
          <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
          <span id="progress-text">Encoding...</span>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
